apiVersion: v1
kind: Namespace
metadata:
  name: chiwei-test
  labels:
    env: test
    chiwei.io/lane-class: coe
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: chiwei-test-quota
  namespace: chiwei-test
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    pods: "50"
    persistentvolumeclaims: "10"
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-cross-ns-egress
  namespace: chiwei-test
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # 允许：同 ns 内
    - to:
        - namespaceSelector:
            matchLabels:
              env: test
    # 允许：DNS（kube-system）
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
    # 允许：访问 cpu1 宿主机（chiwei-test-postgres / -rabbitmq / -redis）
    - to:
        - ipBlock:
            cidr: 10.37.6.235/32  # cpu1 IP
