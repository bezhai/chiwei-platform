# PostgreSQL 运行在宿主机 Docker 上，通过 headless Service + Endpoints 代理
# Endpoints 包含宿主机 IP，不纳入版本管理，需手动 kubectl apply
# 参考: kubectl -n prod apply -f <endpoints.yaml>
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: prod
  labels:
    app: postgres
    tier: infra
spec:
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
  clusterIP: None
