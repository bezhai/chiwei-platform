grafana:
  # adminPassword set via --set grafana.adminPassword=... at install time
  service:
    type: NodePort
    nodePort: 30030
  persistence:
    enabled: true
    storageClassName: ""
    existingClaim: pvc-grafana
  nodeSelector:
    node-role: infra
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki-gateway.monitoring.svc.cluster.local
      access: proxy
      isDefault: false

prometheus:
  prometheusSpec:
    nodeSelector:
      node-role: infra
    securityContext:
      runAsUser: 0
      runAsGroup: 0
      fsGroup: 0
      runAsNonRoot: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: ""
          volumeName: pv-prometheus
          resources:
            requests:
              storage: 10Gi

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true

alertmanager:
  enabled: true
  alertmanagerSpec:
    nodeSelector:
      node-role: infra
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: ""
          volumeName: pv-alertmanager
          resources:
            requests:
              storage: 2Gi
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: feishu
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
    receivers:
      - name: feishu
        webhook_configs:
          - url: 'http://alert-webhook.prod.svc.cluster.local:8080/webhook'
            send_resolved: true
      - name: "null"
