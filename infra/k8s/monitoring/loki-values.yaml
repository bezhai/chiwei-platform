deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  rulerConfig:
    alertmanager_url: http://kube-prometheus-stack-alertmanager.monitoring.svc.cluster.local:9093
    storage:
      type: local
      local:
        directory: /var/loki/rules
    enable_api: true

singleBinary:
  replicas: 1
  nodeSelector:
    node-role: infra
  persistence:
    enabled: true
    storageClass: ""
    size: 10Gi
  extraVolumes:
    - name: loki-alert-rules
      configMap:
        name: loki-alert-rules
  extraVolumeMounts:
    - name: loki-alert-rules
      mountPath: /var/loki/rules/fake
      readOnly: true

# Disable all scalable components
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0
ingester:
  replicas: 0
querier:
  replicas: 0
queryFrontend:
  replicas: 0
queryScheduler:
  replicas: 0
distributor:
  replicas: 0
compactor:
  replicas: 0
indexGateway:
  replicas: 0
bloomCompactor:
  replicas: 0
bloomGateway:
  replicas: 0
