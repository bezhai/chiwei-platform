name: dataflow grep gate

# Phase 7a/7b/7c/7d CI gate: closed-gap exact-zero + open-gap baseline.
#
# Closed gaps (Gap 7 / 9 / 11 from Phase 7a + Gap 8 / 12 / 18 from
# Phase 7b + Gap 15 from Phase 7c + Gap 13 / 14 / 16 from Phase 7d)
# must stay at zero occurrences in business code; new violations
# block the PR.
#
# Open gaps (Gap 19 — slated for 7e) carry a baseline count in
# .github/grep-baselines.json. PRs that increase the count block;
# reductions are allowed (and the baseline gets rewritten in the PR
# that closes the gap).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  closed-gap-zero:
    name: Closed-gap exact-zero (Gap 7/8/9/11/12/13/14/15/16/18)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gap 7 — no business retry loops, no insert_idempotent call sites
        shell: bash
        run: |
          set -e
          # business code must not implement its own retry / sleep loops
          c=$(grep -rn -E "while.*retry|for.*range.*retry" \
              apps/agent-service/app/{chat,life,memory,nodes}/ \
              2>/dev/null | grep -v "__pycache__\|/test_" | wc -l || true)
          [ "$c" -eq 0 ] || { echo "Gap 7 violation: $c business retry loops"; exit 1; }
          # business code must not call insert_idempotent — runtime owns dedup.
          # Match call sites only (excludes docstrings + comments referring to it).
          c=$(grep -rn -E '\binsert_idempotent\(' apps/agent-service/app/ \
              2>/dev/null | grep -v "runtime/persist.py\|runtime/durable.py\|__pycache__\|/test_" | wc -l || true)
          [ "$c" -eq 0 ] || { echo "Gap 7 violation: $c insert_idempotent call sites"; exit 1; }
      - name: Gap 11 — no direct contextvar / header reads in dataflow business code
        shell: bash
        run: |
          set -e
          # trace_id_var / lane_var allowlist: runtime/{propagation,middleware,
          # durable,sink_dispatch,emit,outbox,outbox_dispatcher}, api/middleware, infra/rabbitmq,
          # capabilities/* (HTTP capability injects trace into outbound calls).
          c=$(grep -rn "trace_id_var\|lane_var" apps/agent-service/app/ \
              2>/dev/null \
              | grep -v "runtime/propagation.py\|runtime/middleware.py\|api/middleware.py\|infra/rabbitmq.py\|runtime/durable.py\|runtime/sink_dispatch.py\|runtime/emit.py\|runtime/outbox.py\|runtime/outbox_dispatcher.py\|capabilities/\|__pycache__\|/test_" \
              | wc -l || true)
          [ "$c" -eq 0 ] || { echo "Gap 11 violation: $c contextvar reads outside allowlist"; exit 1; }
          # nobody reads message.headers["trace_id"|"lane"] except propagation
          c=$(grep -rn 'headers\["trace_id"\]\|headers\["lane"\]' apps/agent-service/app/ \
              2>/dev/null | grep -v "runtime/propagation.py\|__pycache__\|/test_" | wc -l || true)
          [ "$c" -eq 0 ] || { echo "Gap 11 violation: $c raw header reads"; exit 1; }
      - name: Gap 8 — business `await emit(` count == 10 reviewed call sites
        shell: bash
        run: |
          set -e
          # The 7 category-A mutation sites migrated to transactional_emit
          # in Task 10. Anyone adding a new category-A site MUST register
          # it (spec §4.5.1) and update this count; otherwise the gate
          # catches the regression.
          c=$(grep -rn '\bawait emit(' \
              apps/agent-service/app/nodes/ apps/agent-service/app/agent/ \
              apps/agent-service/app/chat/ apps/agent-service/app/life/ \
              apps/agent-service/app/memory/ \
              --include='*.py' 2>/dev/null | wc -l || true)
          [ "$c" -eq 10 ] || { echo "Gap 8 violation: business await emit count=$c, expected 10"; exit 1; }
      - name: Gap 15 — no arq imports, no arq dependency
        shell: bash
        run: |
          set -e
          # Phase 7c retired the arq-worker Deployment and the long_tasks
          # subsystem. Nothing in agent-service should import arq, and
          # arq must not appear in pyproject.toml.
          c=$(grep -rn -E "from arq|enqueue_job|create_pool" \
              apps/agent-service/app/ 2>/dev/null \
              | grep -v "__pycache__\|/test_" | wc -l || true)
          [ "$c" -eq 0 ] || { echo "Gap 15 violation: $c arq import/call sites"; exit 1; }
          if grep -qE '^[[:space:]]*"arq[[:space:]>=<]' apps/agent-service/pyproject.toml; then
              echo "Gap 15 violation: arq still in apps/agent-service/pyproject.toml"
              exit 1
          fi
      - name: Gap 8 — no commit-then-emit comments
        shell: bash
        run: |
          set -e
          c=$(grep -rn "# emit AFTER commit\|# commit-then-emit" \
              apps/agent-service/app/ 2>/dev/null | wc -l || true)
          [ "$c" -eq 0 ] || { echo "Gap 8 violation: $c commit-then-emit comments"; exit 1; }
      - name: Gap 12 — Makefile DLQ targets and runbook present
        shell: bash
        run: |
          set -e
          grep -q "^dlq-inspect:" Makefile || { echo "Gap 12 violation: Makefile missing dlq-inspect target"; exit 1; }
          grep -q "^dlq-replay:" Makefile  || { echo "Gap 12 violation: Makefile missing dlq-replay target"; exit 1; }
          grep -q "^dlq-dry-run:" Makefile || { echo "Gap 12 violation: Makefile missing dlq-dry-run target"; exit 1; }
          test -f docs/runbooks/dlq-replay.md || { echo "Gap 12 violation: docs/runbooks/dlq-replay.md missing"; exit 1; }
      - name: Gap 18 — no don't-catch comments / requeue=False / business nack
        shell: bash
        run: |
          set -e
          # No more "不要 catch" / "don't catch" warnings: the wire DSL
          # expresses error policy via .on_error("dlq") explicitly.
          c=$(grep -rn "# 不要 catch\|# 不要 try/except\|# don't catch" \
              apps/agent-service/app/nodes/ apps/agent-service/app/agent/ \
              apps/agent-service/app/chat/ apps/agent-service/app/life/ \
              apps/agent-service/app/memory/ 2>/dev/null | wc -l || true)
          [ "$c" -eq 0 ] || { echo "Gap 18 violation: $c don't-catch comments in business code"; exit 1; }
          # Manual ack/nack/requeue=False belongs to the framework
          # (runtime/* + workers/common). The DLQ admin tooling at
          # nodes/dlq_admin.py is the only business-facing exception
          # (the 6-step requeue protocol). Scan business dirs only.
          c=$(grep -rn "requeue=False\|\.nack(" \
              apps/agent-service/app/nodes/ apps/agent-service/app/agent/ \
              apps/agent-service/app/chat/ apps/agent-service/app/life/ \
              apps/agent-service/app/memory/ 2>/dev/null \
              | grep -v "nodes/dlq_admin.py\|__pycache__\|/test_" \
              | wc -l || true)
          [ "$c" -eq 0 ] || { echo "Gap 18 violation: $c nack/requeue=False call sites in business code"; exit 1; }
      - name: Gap 13 — no DB session leakage in business code
        shell: bash
        run: |
          set -e
          BUSINESS=(apps/agent-service/app/nodes/ apps/agent-service/app/agent/ \
                    apps/agent-service/app/chat/ apps/agent-service/app/life/ \
                    apps/agent-service/app/memory/ apps/agent-service/app/skills/)
          # No `from app.data.session import …` in business
          c=$(grep -rnE "from app\.data\.session import|from app\.data import session" \
              "${BUSINESS[@]}" 2>/dev/null | grep -v "__pycache__\|/test_" | wc -l) || true
          [ "$c" -eq 0 ] || { echo "Gap 13 violation: $c data.session imports in business"; exit 1; }
          # No `current_session` import in business (queries layer is internal)
          c=$(grep -rnE "from app\.runtime\.db import.*current_session|from app\.runtime import.*current_session" \
              "${BUSINESS[@]}" 2>/dev/null | grep -v "__pycache__\|/test_" | wc -l) || true
          [ "$c" -eq 0 ] || { echo "Gap 13 violation: $c current_session imports in business"; exit 1; }
          # No session-factory call sites in business
          c=$(grep -rnE "get_session\(|async_session\(|AsyncSessionLocal|current_session\(" \
              "${BUSINESS[@]}" 2>/dev/null | grep -v "__pycache__\|/test_" | wc -l) || true
          [ "$c" -eq 0 ] || { echo "Gap 13 violation: $c session factory call sites in business"; exit 1; }
          # No AsyncSession type references in business (queries own the type)
          c=$(grep -rn "AsyncSession" "${BUSINESS[@]}" 2>/dev/null \
              | grep -v "__pycache__\|/test_" | wc -l) || true
          [ "$c" -eq 0 ] || { echo "Gap 13 violation: $c AsyncSession references in business"; exit 1; }
          # No direct session.<op> in business (session.execute / .commit / ...)
          c1=$(grep -rnE "\bsession\.(execute|commit|add|merge|flush|rollback)\(" \
              "${BUSINESS[@]}" 2>/dev/null | grep -v "__pycache__\|/test_" | wc -l) || true
          c2=$(grep -rnE "\bs\.(execute|commit|add|merge|flush|rollback)\(" \
              "${BUSINESS[@]}" 2>/dev/null | grep -v "__pycache__\|/test_" | wc -l) || true
          c=$((c1 + c2))
          [ "$c" -eq 0 ] || { echo "Gap 13 violation: $c direct session.* in business"; exit 1; }
          # transactional_emit was renamed; emit_tx via app.runtime is the public surface
          c=$(grep -rn "transactional_emit" "${BUSINESS[@]}" 2>/dev/null \
              | grep -v "__pycache__\|/test_" | wc -l) || true
          [ "$c" -eq 0 ] || { echo "Gap 13 violation: $c transactional_emit in business"; exit 1; }
          # Business must not import from app.runtime.outbox (use app.runtime.emit_tx)
          c=$(grep -rn "from app\.runtime\.outbox import" "${BUSINESS[@]}" 2>/dev/null \
              | grep -v "__pycache__\|/test_" | wc -l) || true
          [ "$c" -eq 0 ] || { echo "Gap 13 violation: $c app.runtime.outbox imports in business"; exit 1; }
      - name: Gap 14 — no Redis primitives in business code
        shell: bash
        run: |
          set -e
          BUSINESS=(apps/agent-service/app/nodes/ apps/agent-service/app/agent/ \
                    apps/agent-service/app/chat/ apps/agent-service/app/life/ \
                    apps/agent-service/app/memory/ apps/agent-service/app/skills/)
          c=$(grep -rnE "from app\.infra\.redis import|from app\.infra import redis" \
              "${BUSINESS[@]}" 2>/dev/null | grep -v "__pycache__\|/test_" | wc -l) || true
          [ "$c" -eq 0 ] || { echo "Gap 14 violation: $c infra.redis imports in business"; exit 1; }
          c=$(grep -rnE "redis\.set\(.*nx=True|redis\.eval\(|redis\.smembers\(|redis\.sadd\(" \
              "${BUSINESS[@]}" 2>/dev/null | grep -v "__pycache__\|/test_" | wc -l) || true
          [ "$c" -eq 0 ] || { echo "Gap 14 violation: $c SETNX/eval/smembers/sadd in business"; exit 1; }
      - name: Gap 16 — no httpx or HTTPClient direct imports in business code
        shell: bash
        run: |
          set -e
          BUSINESS=(apps/agent-service/app/nodes/ apps/agent-service/app/agent/ \
                    apps/agent-service/app/chat/ apps/agent-service/app/life/ \
                    apps/agent-service/app/memory/ apps/agent-service/app/skills/)
          c=$(grep -rnE "import httpx|from httpx" "${BUSINESS[@]}" 2>/dev/null \
              | grep -v "__pycache__\|/test_" | wc -l) || true
          [ "$c" -eq 0 ] || { echo "Gap 16 violation: $c httpx imports in business"; exit 1; }
          c=$(grep -rnE "from app\.capabilities\.http import|from app\.capabilities import http" \
              "${BUSINESS[@]}" 2>/dev/null | grep -v "__pycache__\|/test_" | wc -l) || true
          [ "$c" -eq 0 ] || { echo "Gap 16 violation: $c HTTPClient direct imports in business"; exit 1; }

  open-gap-baseline:
    name: Open-gap baseline no-new (Gap 19)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compare counts against baseline
        shell: bash
        run: |
          python3 <<'PY'
          import json, subprocess, sys

          baselines = json.load(open(".github/grep-baselines.json"))
          patterns = {
              "gap_19_create_task_business": (
                  r"asyncio\.create_task|asyncio\.ensure_future",
                  ["apps/agent-service/app/nodes/", "apps/agent-service/app/agent/",
                   "apps/agent-service/app/chat/", "apps/agent-service/app/life/",
                   "apps/agent-service/app/memory/"],
              ),
          }
          fail = False
          for key, (pat, dirs) in patterns.items():
              try:
                  out = subprocess.check_output(
                      ["grep", "-rn", "-E", pat, *dirs],
                      text=True, stderr=subprocess.DEVNULL,
                  )
                  count = len([
                      ln for ln in out.splitlines()
                      if "__pycache__" not in ln and "/test_" not in ln
                  ])
              except subprocess.CalledProcessError:
                  count = 0
              base = baselines.get(key, 0)
              print(f"{key}: count={count} baseline={base}", flush=True)
              if count > base:
                  print(
                      f"  FAIL: {count} > baseline {base}; either reduce the "
                      f"violations in this PR or update the baseline if you "
                      f"truly need to add a new occurrence (rare, requires "
                      f"reviewer sign-off).",
                      file=sys.stderr, flush=True,
                  )
                  fail = True
          sys.exit(1 if fail else 0)
          PY
